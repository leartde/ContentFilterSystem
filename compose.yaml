services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      MSSQL_PID: "Developer"
      SA_PASSWORD: "StrongPassword123@"
      ACCEPT_EULA: "Y"
    ports:
      - "1434:1433"
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -C -S localhost -U sa -P \"$${SA_PASSWORD}\" -Q \"SELECT 1\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s

  api:
    build:
      context: ./api
    ports:
      - "5050:8080"
    environment:
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Server=db,1433;Database=ContentFilter;User Id=sa;Password=StrongPassword123@;TrustServerCertificate=True
      Cors__AllowedOrigins__0: http://localhost:4173
      Cors__AllowedOrigins__1: http://localhost:5173
    depends_on:
      db:
        condition: service_healthy

  client:
    build:
      context: ./client
      args:
        VITE_API_BASE_URL: /api
    ports:
      - "4173:80"
    depends_on:
      - api
